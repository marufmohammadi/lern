<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PosHub — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#2d8c4e;--green-dark:#1a5c32;--green-light:#4ade80;--text:#1e293b;--text-mid:#64748b;--text-light:#94a3b8;--border:#e2e8f0}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1f14 0%,#102818 60%,#0a1a0f 100%);}
    .card{background:#fff;border-radius:20px;padding:48px 44px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,0.3);}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-mid);text-decoration:none;margin-bottom:28px;transition:color .2s}
    .back-link:hover{color:var(--green)}
    .card-icon{width:54px;height:54px;background:linear-gradient(135deg,var(--green),var(--green-light));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin-bottom:20px;box-shadow:0 8px 20px rgba(45,140,78,0.3)}
    .card-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:8px}
    .card-sub{font-size:14px;color:var(--text-mid);line-height:1.6;margin-bottom:28px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px}
    .input-wrap{position:relative}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:14px;pointer-events:none}
    .input-wrap input{width:100%;padding:12px 14px 12px 42px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:#f8fafc;outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrap input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(45,140,78,.1)}
    .alert{display:none;padding:12px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:16px;align-items:center;gap:9px}
    .alert.error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;display:flex}
    .alert.success{background:#dcfce7;color:#166534;border:1px solid #86efac;display:flex}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#38a169);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(45,140,78,.35)}
    .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,140,78,.45)}
    .btn:disabled{opacity:.7;cursor:not-allowed}
    .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    <div class="card-icon"><i class="fas fa-key"></i></div>
    <h1 class="card-title">Reset Password</h1>
    <p class="card-sub">Enter your account email and we'll send you a password reset link.</p>

    <div class="alert" id="alertBox">
      <i class="fas fa-exclamation-circle"></i>
      <span id="alertMsg"></span>
    </div>

    <form id="resetForm" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="admin@company.com" autocomplete="email" required>
        </div>
      </div>
      <button type="submit" class="btn" id="resetBtn">
        <span class="spinner" id="spinner"></span>
        <i class="fas fa-paper-plane" id="btnIcon"></i>
        <span id="btnText">Send Reset Link</span>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      const btn     = document.getElementById('resetBtn');
      const spinner = document.getElementById('spinner');
      const icon    = document.getElementById('btnIcon');
      const text    = document.getElementById('btnText');
      btn.disabled  = true;
      spinner.style.display = 'block';
      icon.style.display    = 'none';
      text.textContent      = 'Sending…';

      try {
        const { error } = await db.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-confirm.html'
        });
        if (error) throw error;
        const box = document.getElementById('alertBox');
        box.className = 'alert success';
        document.getElementById('alertMsg').textContent = 'Reset link sent! Check your email inbox.';
        document.getElementById('resetForm').style.display = 'none';
      } catch(err) {
        const box = document.getElementById('alertBox');
        box.className = 'alert error';
        document.getElementById('alertMsg').textContent = err.message || 'Failed to send reset link.';
        btn.disabled = false;
        spinner.style.display = 'none';
        icon.style.display    = 'inline';
        text.textContent      = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
